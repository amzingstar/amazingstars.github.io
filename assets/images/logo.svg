<?xml version="1.0" encoding="UTF-8"?>
<!--
  HOW TO CUSTOMIZE THIS SVG LOGO

  1) Change colors:
     - Edit the CSS variables inside <style> under :root.
     - Rainbow arc uses --brand-red through --brand-violet.
     - Text and outlines use --text-main, --text-accent, --outline-dark.

  2) Change daycare name and tagline:
     - Main name is the text node with id="logo-name".
     - Tagline is the text node with id="logo-tagline".

  3) Resize for navbar/footer/mobile:
     - This SVG is responsive via viewBox.
     - In HTML, set width only (height auto) for clean scaling:
       Navbar: 180-240px
       Footer: 220-300px
       Mobile: 140-180px
     - Keep preserveAspectRatio="xMidYMid meet" for best fit.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 920 320"
     width="920"
     height="320"
     role="img"
     aria-labelledby="logoTitle logoDesc"
     preserveAspectRatio="xMidYMid meet">
  <title id="logoTitle">Amazing Stars Kids Care logo</title>
  <desc id="logoDesc">Playful daycare logo with rainbow arc, clouds, stars, and warm friendly typography.</desc>

  <defs>
    <style>
      :root {
        --brand-red: #ef2f2f;
        --brand-orange: #f58a1f;
        --brand-yellow: #f9de45;
        --brand-green: #53b64a;
        --brand-cyan: #28b8d8;
        --brand-blue: #1f62d0;
        --brand-indigo: #3143b7;
        --brand-violet: #7b3fc7;

        --text-main: #f9de45;
        --text-accent: #ffffff;
        --outline-dark: #123a84;
        --star: #ffe857;
        --cloud: #ffffff;
        --shadow: rgba(7, 35, 91, 0.28);
      }

      .name {
        font-family: "Baloo 2", "Fredoka", "Comic Sans MS", "Trebuchet MS", sans-serif;
        font-weight: 800;
        letter-spacing: 0.5px;
        fill: var(--text-main);
        stroke: var(--outline-dark);
        stroke-width: 10;
        paint-order: stroke fill;
      }

      .tagline {
        font-family: "Baloo 2", "Comic Sans MS", "Trebuchet MS", sans-serif;
        font-weight: 700;
        letter-spacing: 0.4px;
        fill: var(--text-accent);
        stroke: var(--outline-dark);
        stroke-width: 6;
        paint-order: stroke fill;
      }
    </style>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="var(--shadow)"/>
    </filter>

    <filter id="textGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.8" flood-color="#ffffff" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Transparent background keeps it compatible on both light and dark navbars -->

  <!-- Rainbow arc -->
  <g fill="none" stroke-linecap="round" filter="url(#softShadow)">
    <path d="M95 210 A365 365 0 0 1 825 210" stroke="var(--brand-red)" stroke-width="34"/>
    <path d="M120 210 A340 340 0 0 1 800 210" stroke="var(--brand-orange)" stroke-width="30"/>
    <path d="M143 210 A317 317 0 0 1 777 210" stroke="var(--brand-yellow)" stroke-width="28"/>
    <path d="M166 210 A294 294 0 0 1 754 210" stroke="var(--brand-green)" stroke-width="26"/>
    <path d="M188 210 A272 272 0 0 1 732 210" stroke="var(--brand-cyan)" stroke-width="24"/>
    <path d="M210 210 A250 250 0 0 1 710 210" stroke="var(--brand-blue)" stroke-width="22"/>
    <path d="M230 210 A230 230 0 0 1 690 210" stroke="var(--brand-indigo)" stroke-width="20"/>
    <path d="M248 210 A212 212 0 0 1 672 210" stroke="var(--brand-violet)" stroke-width="18"/>
  </g>

  <!-- Clouds -->
  <g fill="var(--cloud)" filter="url(#softShadow)" opacity="0.98">
    <g transform="translate(110 78)">
      <circle cx="30" cy="22" r="18"/>
      <circle cx="50" cy="16" r="23"/>
      <circle cx="75" cy="24" r="18"/>
      <rect x="26" y="24" width="55" height="17" rx="8"/>
    </g>
    <g transform="translate(700 85)">
      <circle cx="24" cy="20" r="16"/>
      <circle cx="44" cy="14" r="21"/>
      <circle cx="68" cy="22" r="17"/>
      <rect x="21" y="22" width="50" height="16" rx="8"/>
    </g>
  </g>

  <!-- Stars -->
  <g fill="var(--star)" stroke="var(--outline-dark)" stroke-width="3" filter="url(#softShadow)">
    <path d="M232 88 l8 18 20 2 -15 12 5 19 -18 -10 -18 10 5 -19 -15 -12 20 -2z"/>
    <path d="M692 92 l7 15 17 2 -13 11 4 17 -15 -8 -15 8 4 -17 -13 -11 17 -2z"/>
    <path d="M460 62 l6 13 14 2 -11 9 3 14 -12 -7 -12 7 3 -14 -11 -9 14 -2z"/>
  </g>

  <!-- Main wordmark -->
  <g filter="url(#textGlow)">
    <text id="logo-name"
          class="name"
          x="460" y="155"
          text-anchor="middle"
          font-size="88">
      Amazing Stars
    </text>
    <text
          class="name"
          x="460" y="225"
          text-anchor="middle"
          font-size="76">
      Kids Care
    </text>
  </g>

  <!-- Tagline -->
  <text id="logo-tagline"
        class="tagline"
        x="460" y="278"
        text-anchor="middle"
        font-size="40">
    Home Day Care for Kids
  </text>
</svg>
